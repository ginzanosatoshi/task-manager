
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1.5rem 1rem;max-width:720px;margin:0 auto}
h1{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.5rem}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:180px}
.toolbar select{width:120px}
.toolbar input[type=date]{width:150px}
.btn-add{background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);padding:8px 16px;cursor:pointer;font-size:14px;font-weight:500}
.btn-add:hover{opacity:0.85}
.filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--color-text-secondary);cursor:pointer}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;display:flex;align-items:center;gap:12px}
.task-card.done{opacity:0.5}
.task-card.done .task-title{text-decoration:line-through}
.check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--color-border-secondary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check.checked{background:var(--color-text-primary);border-color:var(--color-text-primary)}
.check.checked::after{content:'';width:6px;height:10px;border:2px solid var(--color-background-primary);border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:15px;color:var(--color-text-primary);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.badge.high{background:#FAECE7;color:#993C1D}
.badge.mid{background:#FAEEDA;color:#854F0B}
.badge.low{background:#EAF3DE;color:#3B6D11}
.due{font-size:12px;color:var(--color-text-secondary)}
.due.overdue{color:#A32D2D;font-weight:500}
.due.today{color:#854F0B;font-weight:500}
.task-actions{display:flex;gap:4px}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-tertiary);padding:4px;border-radius:6px;font-size:14px;line-height:1}
.icon-btn:hover{color:var(--color-text-primary);background:var(--color-background-secondary)}
.empty{text-align:center;padding:3rem;color:var(--color-text-tertiary);font-size:14px}
.edit-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.edit-row input,.edit-row select{font-size:13px;padding:4px 8px}
.edit-row .btn-save{background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);padding:4px 12px;font-size:13px;cursor:pointer}
.edit-row .btn-cancel{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 12px;font-size:13px;cursor:pointer;color:var(--color-text-secondary)}
</style>
<div class="wrap">
<h1>タスク管理</h1>
<div class="toolbar">
  <input type="text" id="new-title" placeholder="新しいタスクを入力..." />
  <select id="new-pri">
    <option value="high">高 優先度</option>
    <option value="mid" selected>中 優先度</option>
    <option value="low">低 優先度</option>
  </select>
  <input type="date" id="new-due" />
  <button class="btn-add" onclick="addTask()">追加</button>
</div>
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('active',this)">未完了</button>
  <button class="filter-btn" onclick="setFilter('done',this)">完了済み</button>
  <button class="filter-btn" onclick="setFilter('overdue',this)">期限切れ</button>
  <button class="filter-btn" onclick="setFilter('today',this)">今日まで</button>
</div>
<div class="task-list" id="task-list"></div>
</div>
<script>
let tasks=[
  {id:1,title:'企画書を作成する',pri:'high',due:'2026-04-04',done:false},
  {id:2,title:'デザインレビュー',pri:'mid',due:'2026-04-05',done:false},
  {id:3,title:'週次レポート提出',pri:'low',due:'2026-04-10',done:true},
];
let filter='all';
let editId=null;
let nextId=4;

function today(){return new Date().toISOString().slice(0,10)}

function dueLabel(due){
  if(!due)return null;
  const t=today();
  if(due<t)return {label:'期限切れ',cls:'overdue'};
  if(due===t)return {label:'今日まで',cls:'today'};
  return {label:due.replace(/-/g,'/'),cls:''};
}

function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filtered(){
  const t=today();
  return tasks.filter(tk=>{
    if(filter==='active')return !tk.done;
    if(filter==='done')return tk.done;
    if(filter==='overdue')return !tk.done&&tk.due&&tk.due<t;
    if(filter==='today')return !tk.done&&tk.due===t;
    return true;
  });
}

function render(){
  const list=document.getElementById('task-list');
  const shown=filtered();
  if(!shown.length){list.innerHTML='<div class="empty">タスクはありません</div>';return;}
  list.innerHTML=shown.map(tk=>{
    const d=tk.due?dueLabel(tk.due):null;
    const isEdit=editId===tk.id;
    return`<div class="task-card${tk.done?' done':''}">
      <div class="check${tk.done?' checked':''}" onclick="toggle(${tk.id})"></div>
      <div class="task-body">
        <div class="task-title">${esc(tk.title)}</div>
        <div class="task-meta">
          <span class="badge ${tk.pri}">${tk.pri==='high'?'高優先度':tk.pri==='mid'?'中優先度':'低優先度'}</span>
          ${d?`<span class="due ${d.cls}">${d.label}</span>`:''}
        </div>
        ${isEdit?`<div class="edit-row">
          <input type="text" id="e-title" value="${esc(tk.title)}" style="flex:1;min-width:140px">
          <select id="e-pri"><option value="high"${tk.pri==='high'?' selected':''}>高</option><option value="mid"${tk.pri==='mid'?' selected':''}>中</option><option value="low"${tk.pri==='low'?' selected':''}>低</option></select>
          <input type="date" id="e-due" value="${tk.due||''}">
          <button class="btn-save" onclick="saveEdit(${tk.id})">保存</button>
          <button class="btn-cancel" onclick="cancelEdit()">キャンセル</button>
        </div>`:''}
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="startEdit(${tk.id})" title="編集">✏</button>
        <button class="icon-btn" onclick="del(${tk.id})" title="削除">✕</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function addTask(){
  const t=document.getElementById('new-title').value.trim();
  if(!t)return;
  tasks.unshift({id:nextId++,title:t,pri:document.getElementById('new-pri').value,due:document.getElementById('new-due').value||'',done:false});
  document.getElementById('new-title').value='';
  document.getElementById('new-due').value='';
  render();
}

function toggle(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);render();}
function del(id){tasks=tasks.filter(t=>t.id!==id);render();}
function startEdit(id){editId=id;render();document.getElementById('e-title').focus();}
function cancelEdit(){editId=null;render();}
function saveEdit(id){
  const title=document.getElementById('e-title').value.trim();
  if(!title)return;
  tasks=tasks.map(t=>t.id===id?{...t,title,pri:document.getElementById('e-pri').value,due:document.getElementById('e-due').value}:t);
  editId=null;render();
}
document.getElementById('new-title').addEventListener('keydown',e=>{if(e.key==='Enter')addTask()});
render();
</script>
